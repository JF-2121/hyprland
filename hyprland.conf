# --- 1. System & Environment Setup ---
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

# --- 2. Monitor Setup ---
monitor=eDP-1,1920x1080@60,0x0,1

# --- 3. Autostart (STABIL & SCHNELL) ---
# Zuerst die Umgebung für D-Bus/Nautilus/Waybar klarmachen
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# Dann die Optik
exec-once = hyprpaper
exec-once = waybar
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark's


# Input configuration
input {
    kb_layout = de
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
    }
    sensitivity = 0.2
}

general {
    gaps_in = 2
    gaps_out = 2
    border_size = 2
    
    # Verlauf von Blau zu Violett für den ultimativen Effekt
    col.active_border = rgba(0, 209, 255, 1.0) rgba(125, 82, 255, 1.0) 45deg
    col.inactive_border = rgba(50, 50, 50, 0.5)

    layout = dwindle
}

decoration {
    rounding = 20

    active_opacity = 0.90      
    inactive_opacity = 0.87

    # Blur Effekt
    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
    }

    # FIX FÜR DIE FEHLERMELDUNG:
    # Wir benutzen hier die flache Syntax, falls dein Hyprland 
    # den neuen "shadow {}" Block noch nicht frisst:
    drop_shadow = true
    shadow_range = 20
    shadow_render_power = 4
    col.shadow = rgba(0, 209, 255, 0.8)
    col.shadow_inactive = rgba(10, 10, 15, 0.5)
}

animations {
    enabled = yes
    # Coole, schnelle Kurve für echte "Speed"-Gefühle
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 5, myBezier    # Fenster erscheinen schneller
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 4, default, slide # Schneller Workspace-Wechsel
}

# Dwindle layout settings
dwindle {
    pseudotile = yes
    preserve_split = yes
}

# Gestures settings
gestures {
    workspace_swipe = true
}

# Window rules (consolidated for clarity)
windowrulev2 = opacity 0.9 0.9,class:^(kitty)$
windowrulev2 = opacity 0.9 0.9,class:^(Logseq)$

# Lock screen setup
$lock = swaylock -f --color ab00bd
exec-once = swayidle -w timeout 30 swaylock timeout 30 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' before-sleep swaylock

# Default Apps
$textEditor = codium
$notesApp = ~/Apps/Logseq.AppImage
$webBrowser = firefox
$musicApp = LD_PRELOAD=/usr/local/lib/spotify-adblock.so spotify

# Keybindings
$mainMod = SUPER
$appLaunchKey = Alt_l SHIFT
$mediaKey = Alt_r SHIFT

# Example binds
bind = $mainMod, RETURN, exec, alacritty  # open the terminal
bind = $mainMod, Q, killactive        # close the active window
bind = $mainMod, L, exec, swaylock --color 1e1e2eFF  # lock the screen
bind = $mainMod, M, exec, wlogout --protocol layer-shell  # show logout window
bind = $mainMod, E, exec, nautilus --new-window
bind = $mainMod, V, togglefloating   # allow a window to float
bind = $mainMod, SPACE, exec, wofi --show drun     # show app launcher
bind = $mainMod, J, togglesplit      # dwindle
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -  # screenshot

# Media controls
bind = $mediaKey, M, exec, playerctl next
bind = $mediaKey, B, exec, playerctl previous
bind = $mediaKey, N, exec, playerctl play-pause

# App Launch Keys
bind = $appLaunchKey, E, exec, $textEditor
bind = $appLaunchKey, N, exec, $notesApp
bind = $appLaunchKey, W, exec, $webBrowser
bind = $appLaunchKey, M, exec, $musicApp

# Audio & Brightness Control
bind = $appLaunchKey, A, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = $appLaunchKey, Q, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = $appLaunchKey, Y, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle



# Window resizing
bind = $mainMod, H, resizeactive, 49
bind = $mainMod, G, resizeactive, -51 0
bind = $mainMod, T, resizeactive, -1 -50
bind = $mainMod, Y, resizeactive, -1 50

# Focus and workspace switching
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, 0, workspace, 1
bind = $mainMod, 1, workspace, 2
# More workspace switching ...

# Move windows with mouse (optional)
bindm = $mainMod, mouse:271, movewindow
bindm = $mainMod, mouse:272, resizewindow

# Fenster auf den nächsten/vorherigen Workspace SCHIEBEN (Fokus bleibt)
bind = $mainMod SHIFT, right, movetoworkspace, e+1
bind = $mainMod SHIFT, left, movetoworkspace, e-1

# Fenster auf einen SPEZIFISCHEN Workspace schieben (mit Zahlen)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 0


windowrulev2 = opacity 0.8 0.7, class:^(kitty)$

# Wechselt zum nächsten Fenster auf dem AKTUELLEN Workspace
# bind = ALT, Tab, cyclenext,
# Sorgt dafür, dass das Fenster auch wirklich den Fokus bekommt
# bind = ALT, Tab, bringactivetotop,

# FALLS du durch ALLE Fenster auf ALLEN Workspaces tappen willst:
# bind = ALT, Tab, focuscurrentorlast

# Simuliert eine Übersicht, indem alle Fenster auf dem Screen verteilt werden
# bind = ALT, Tab, workspace, e+1

# Springt immer zwischen dem aktuellen und dem letzten Fenster hin und her
bind = ALT, Tab, focuscurrentorlast,


# Helligkeit erhöhen (F3 / Sonnentaste)
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , F3, exec, brightnessctl set 5%+

# Helligkeit senken (F2 / Sonnentaste)
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
binde = , F2, exec, brightnessctl set 5%-

# Ton aus/an (F5 / Mute)
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , F5, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Lauter (F7) - Das "-l 1.0" erzwingt das 100% Limit
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde = , F7, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+

# Leiser (F6) - Hier brauchen wir kein Limit nach unten
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = , F6, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-


# Nutze die X11-Namen der Medientasten (das klappt fast immer)
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next

# Falls dein Laptop F8-F11 NUR mit der "Fn"-Taste erkennt:
bindl = , F8, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , F9, exec, playerctl previous0
bindl = , F10, exec, playerctl play-pause
bindl = , F11, exec, playerctl next


# Fenster in Fullscreen schalten (wie F11)
bind = $mainMod, F, fullscreen, 0


# Fenster physisch verschieben (Swap)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Wechsel zu Workspace 1-9 mit Super + Zahl
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
